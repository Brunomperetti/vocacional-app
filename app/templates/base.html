<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}vocacional-app{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <a class="brand" href="/">vocacional-app</a>
      <div class="nav-links">
        <a href="/test">Test</a>
        {# /admin se protegerá con login real en una próxima etapa. #}
      </div>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Orientación vocacional basada en RIASEC. Versión inicial.</p>
  </footer>
  <script src="{{ url_for('static', path='/js/app.js') }}"></script>
</body>
</html>
